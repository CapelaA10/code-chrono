name: Release Code Chrono

# Required GitHub Secrets (Settings → Secrets → Actions):
#   TAURI_SIGNING_PRIVATE_KEY          — Minisign private key (base64-encoded)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — passphrase for the key (can be empty)
#
# Without the signing key, `latest.json` is never generated and auto-update
# will always return 404.
#
# Trigger: push to main/master with "release:" in the commit message.
# e.g. git commit -m "release: 0.4.0"
on:
  push:
    branches:
      - main
      - master

jobs:
  release:
    # Only run when the commit message starts with "release:"
    if: "contains(github.event.head_commit.message, 'release:')"
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'      # Universal Mac (M-series & Intel)
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'      # Linux (.deb, .AppImage)
            args: ''
          - platform: 'windows-latest'    # Windows (.exe, .msi)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Frontend Dependencies
        run: npm install

      # tauri-action builds, signs the update bundles (producing .sig files and
      # latest.json), and uploads all assets to the GitHub Release.
      # TAURI_SIGNING_PRIVATE_KEY *must* be set in GitHub Secrets or the updater
      # manifest (latest.json) will be silently omitted from the release.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'v__VERSION__'
          releaseBody: 'See [CHANGELOG.md](https://github.com/CapelaA10/code-chrono/blob/main/CHANGELOG.md) for what changed in this release.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
